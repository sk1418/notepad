name: 🐳 Docker publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (overrides version from build.gradle.kts). Leave empty to use gradle version.'
        required: false
        default: ''

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: notepad

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve version
        id: ver
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            V="${{ github.event.inputs.tag }}"
          else
            V=$(./gradlew -q :properties | awk '/^version:/ {print $2}')
          fi
          if [[ -z "$V" ]]; then
            echo "Could not resolve version" >&2; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "==> Publishing version: $V"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
