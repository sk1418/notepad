name: 🐳 Build and push image

on:
  push:
    tags:
      - 'v*'          # e.g. v0.0.1
    branches:
      - master        # build+push :latest on every master push
  workflow_dispatch:  # manual trigger
    inputs:
      tag:
        description: 'Extra tag to publish (in addition to :latest and version)'
        required: false
        default: ''

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: notepad     # Docker Hub repo name; owner is DOCKERHUB_USER secret

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # for GHCR (used as a mirror)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: ver
        run: |
          VERSION=$(grep -E '^version\s*=\s*"' build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "Could not read version" >&2; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "==> Project version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          DH="docker.io/${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}"
          GH="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          V="${{ steps.ver.outputs.version }}"
          TAGS="${DH}:${V},${DH}:latest,${GH}:${V},${GH}:latest"
          # If pushed from a git tag vX.Y.Z, also tag the image with that git tag
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            GTAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${DH}:${GTAG},${GH}:${GTAG}"
          fi
          # Manual dispatch extra tag
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAGS="${TAGS},${DH}:${{ github.event.inputs.tag }},${GH}:${{ github.event.inputs.tag }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "==> Tags: $TAGS"

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
